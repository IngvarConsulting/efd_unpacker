name: Build and Release

on:
  push:
    tags:
      - 'v*'

# Add permissions for creating releases
permissions:
  contents: write
  packages: write

jobs:
  test-suite:
    name: Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15-intel, windows-2022]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup CI environment
        run: |
          make install-deps
      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          make test

  build-linux:
    needs: test-suite
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup CI environment
        run: |
          make install-deps
      - name: Build Linux version
        run: |
          make build-linux
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          if-no-files-found: error
          path: |
            dist/efd-unpacker-*-linux.AppImage
            dist/efd-unpacker-*-linux*.deb

  build-windows:
    needs: test-suite
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup CI environment
        run: |
          make install-deps
      - name: Build Windows version
        run: |
          make build-windows
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          if-no-files-found: error
          path: |
            dist/efd-unpacker-*-windows-setup.exe

  build-macos:
    needs: test-suite
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup CI environment
        run: |
          make install-deps
      - name: Build macOS version
        run: |
          make build-macos
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          if-no-files-found: error
          path: |
            dist/efd-unpacker-*-macos.dmg

  test-appimage:
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist
      - name: Move AppImage to root
        run: |
          APPIMAGE="$(find dist -type f -name '*.AppImage' | head -n 1)"
          if [ -z "$APPIMAGE" ]; then
            echo "AppImage artifact not found under dist"
            find dist -maxdepth 5 -print || true
            exit 1
          fi
          mv "$APPIMAGE" ./efd_unpacker.AppImage
      - name: Test AppImage
        run: |
          chmod +x ./efd_unpacker.AppImage
          mkdir -p "$RUNNER_TEMP/efd-out"
          ./efd_unpacker.AppImage --help
          ./efd_unpacker.AppImage unpack tests/data/1cv8.efd -tmplts "$RUNNER_TEMP/efd-out"

  test-deb:
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist
      - name: List dist contents
        run: find dist -maxdepth 5 -print || true
      - name: Test DEB
        run: |
          sudo apt-get install -y $(find . -name '*.deb')
          ls -l /usr/bin /usr/local/bin || true
          mkdir -p "$RUNNER_TEMP/efd-out"
          efd_unpacker --help
          efd_unpacker unpack tests/data/1cv8.efd -tmplts "$RUNNER_TEMP/efd-out"

  test-windows-setup:
    needs: build-windows
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist
      - name: List dist contents
        run: |
          Get-ChildItem -Path dist -Recurse -Force | Format-Table FullName
      - name: Move setup.exe to root
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path dist -Recurse -File -Filter *-windows-setup.exe | Select-Object -First 1
          if (-not $setup) { throw "Windows setup artifact not found under dist" }
          Move-Item $setup.FullName .\efd_unpacker_setup.exe
      - name: Test Windows setup
        shell: pwsh
        run: |
          $setup = Start-Process -FilePath .\efd_unpacker_setup.exe -ArgumentList "/quiet","/norestart" -Wait -PassThru
          if ($setup.ExitCode -ne 0) { throw "Setup failed with exit code $($setup.ExitCode)" }
          $exeCandidates = @(
            "C:\Program Files\EFD Unpacker\EFDUnpacker.exe",
            "C:\Program Files (x86)\EFD Unpacker\EFDUnpacker.exe",
            "C:\efd_unpacker\EFDUnpacker.exe"
          )
          $exe = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) { throw "Installed executable not found" }
          $out = Join-Path $env:TEMP "efd-out"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          & $exe --help
          & $exe unpack tests/data/1cv8.efd -tmplts $out

  test-dmg:
    needs: build-macos
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: dist
      - name: List dist contents
        run: find dist -maxdepth 5 -print || true
      - name: Move DMG to root
        run: |
          DMG="$(find dist -type f -name '*.dmg' | head -n 1)"
          if [ -z "$DMG" ]; then
            echo "DMG artifact not found under dist"
            find dist -maxdepth 5 -print || true
            exit 1
          fi
          mv "$DMG" ./efd_unpacker.dmg
      - name: Test DMG
        run: |
          hdiutil attach ./efd_unpacker.dmg
          ls -l "/Volumes/EFD Unpacker/"
          cp -R "/Volumes/EFD Unpacker/EFDUnpacker.app" /tmp/
          ls -l /tmp/EFDUnpacker.app/Contents/MacOS/
          mkdir -p "$RUNNER_TEMP/efd-out"
          /tmp/EFDUnpacker.app/Contents/MacOS/EFDUnpacker --help
          /tmp/EFDUnpacker.app/Contents/MacOS/EFDUnpacker unpack tests/data/1cv8.efd -tmplts "$RUNNER_TEMP/efd-out"
          hdiutil detach "/Volumes/EFD Unpacker"

  create-release:
    needs: [test-appimage, test-deb, test-windows-setup, test-dmg]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Нужно для получения истории коммитов

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create version and generate release notes
        id: release_meta
        run: |
          make create-version
          make generate-release-notes
          echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          cat release_notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EFD Unpacker ${{ steps.release_meta.outputs.version }}
          body: ${{ steps.release_meta.outputs.release_notes }}
          draft: false
          prerelease: false
          files: |
            artifacts/linux-builds/*
            artifacts/windows-builds/*
            artifacts/macos-builds/*
